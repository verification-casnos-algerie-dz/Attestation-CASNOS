<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attestation Authentique - Vérification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        
        .header-image {
            width: 100%;
            height: 170px;
            object-fit: fill;
            display: block;
        }
        
        .attestation-text {
            width: 100%;
            text-align: center;
            margin-top: 16px;
            margin-bottom: 16px;
            font-size: 12pt;
            font-weight: bold;
        }
        
        .text-green {
            color: #16a34a;
        }
        
        .text-red {
            color: #dc2626;
        }
        
        .info-container {
            max-width: calc(100% - 4px);
            margin: 0 auto;
            background-color: white;
            border: 0.5px solid #16a34a;
            border-radius: 10px;
            padding: 6px 4px;
            font-size: 12pt;
            line-height: 1.6;
        }
        
        .info-text {
            text-align: left;
        }
        
        .info-text p {
            margin-bottom: 5px;
        }
        
        .info-text p:last-child {
            margin-bottom: 0;
        }
        
        .label {
            font-weight: bold;
        }
        
        .red-slash {
            color: #dc2626;
        }
        
        .error-message {
            color: #dc2626;
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main class="container">
        <!-- Header Image -->
        <div>
            <img src="https://i.imgur.com/BLPOEaV.jpeg" alt="Header banner" class="header-image">
        </div>
        <script>
            // Get the idMat parameter from the URL
            const params = new URLSearchParams(window.location.search);
            const idMats = params.get('idMat');
            // Display it
            //document.getElementById('result').textContent = idMat || 'No ID provided';
        </script>
        <!-- Attestation Text Lines -->
        <div class="attestation-text">
            <p class="text-green">Attestation authentique</p>
            <p class="text-red">Veuillez vérifier les informations personelles</p>
        </div>

        <!-- Information Container -->
        <div class="info-container">
            <div class="info-text" id="userInfo">
                <p class="error-message">Chargement des données...</p>
            </div>
        </div>
    </main>

    <script>
        // Load JSON data and display user information
        function loadUserData() {
            const idMat = idMats;
            
            if (!idMat) {
                document.getElementById('userInfo').innerHTML = 
                    '<p class="error-message">Veuillez fournir un numéro de matricule.</p>';
                return;
            }

            // Fetch the JSON data
            fetch('dataJS.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Fichier de données introuvable');
                    }
                    return response.json();
                })
                .then(data => {
                    // Search for user by id_mat
                    const user = data.users.find(u => u.id_mat === idMat);
                    
                    if (user) {
                        // Display user data
                        const dateAnnul = user.date_annul ? user.date_annul : '<span class="red-slash"> /</span>';
                        document.getElementById('userInfo').innerHTML = `
                            <p>
                                <span class="label">Matricule:</span> ${user.id_mat}
                            </p>
                            <p>
                                <span class="label">N° attestation:</span> ${user.num_att}
                            </p>
                            <p>
                                <span class="label">Nom:</span> ${user.nom}
                            </p>
                            <p>
                                <span class="label">Prenom:</span> ${user.prenom}
                            </p>
                            <p>
                                <span class="label">Date de naissance:</span> ${user.birth}
                            </p>
                            <p>
                                <span class="label">Date ajour:</span> 31-12-2026
                            </p>
                            <p>
                                <span class="label">Date annulation:</span> ${dateAnnul}
                            </p>
                        `;
                    } else {
                        document.getElementById('userInfo').innerHTML = 
                            '<p class="error-message">Matricule non trouvé dans la base de données.</p>';
                    }
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    document.getElementById('userInfo').innerHTML = 
                        '<p class="error-message">Erreur lors du chargement des données: ' + error.message + '</p>';
                });
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
