<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        form { display: grid; gap: 10px; max-width: 400px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .controls { margin-top: 20px; border-top: 1px solid #ccc; pt: 10px; }
    </style>
</head>
<body>
    <h1>User Management Interface</h1>
    <table id="userTable">
        <thead>
            <tr>
                <th>ID Mat</th>
                <th>Num Att</th>
                <th>Nom</th>
                <th>Prenom</th>
                <th>Birth</th>
                <th>Date Annul</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Add/Edit User</h2>
    <form id="userForm">
        <input type="hidden" id="userId" />
        <label>ID Mat:</label><input type="text" id="id_mat" required />
        <label>Num Att:</label><input type="text" id="num_att" required />
        <label>Nom:</label><input type="text" id="nom" required />
        <label>Prenom:</label><input type="text" id="prenom" required />
        <label>Birth:</label><input type="date" id="birth" required />
        <label>Date Annul:</label><input type="date" id="date_annul" required />
        <button type="submit">Save to List</button>
    </form>

    <div class="controls">
        <p><strong>Step 2:</strong> After saving changes above, click below to update your file.</p>
        <button id="downloadJson" style="padding: 10px; background: #16a34a; color: white; border: none; cursor: pointer;">
            Download Updated dataJS.json
        </button>
    </div>

    <script>
        let users = [];

        // Helper: Convert YYYY-MM-DD (HTML) to DD-MM-YYYY (JSON)
        function formatToJSONDate(dateStr) {
            if (!dateStr) return "";
            const [year, month, day] = dateStr.split('-');
            return `${day}-${month}-${year}`;
        }

        // Helper: Convert DD-MM-YYYY (JSON) to YYYY-MM-DD (HTML)
        function formatToHTMLDate(dateStr) {
            if (!dateStr || !dateStr.includes('-')) return "";
            const [day, month, year] = dateStr.split('-');
            return `${year}-${month}-${day}`;
        }

        function loadUsers() {
            fetch('dataJS.json')
                .then(response => response.json())
                .then(data => {
                    // Fix: Target the 'users' array inside the object
                    users = data.users || []; 
                    displayUsers();
                })
                .catch(err => console.error("Error loading JSON:", err));
        }

        function displayUsers() {
            const tbody = document.querySelector('#userTable tbody');
            tbody.innerHTML = '';
            users.forEach((user, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = user.id_mat;
                row.insertCell(1).innerText = user.num_att;
                row.insertCell(2).innerText = user.nom;
                row.insertCell(3).innerText = user.prenom;
                row.insertCell(4).innerText = user.birth;
                row.insertCell(5).innerText = user.date_annul;
                const actionsCell = row.insertCell(6);
                actionsCell.innerHTML = `
                    <button onclick='editUser(${index})'>Edit</button> 
                    <button onclick='deleteUser(${index})' style="color:red">Delete</button>`;
            });
        }

        document.getElementById('userForm').onsubmit = function (event) {
            event.preventDefault();
            const id = document.getElementById('userId').value;

            let date_annulation = formatToJSONDate(document.getElementById('date_annul').value);
            if (date_annulation == "01-01-2000"){
                date_annulation = "/";
            }
            const newUser = {
                id_mat: document.getElementById('id_mat').value,
                num_att: document.getElementById('num_att').value,
                nom: document.getElementById('nom').value.toUpperCase(),
                prenom: document.getElementById('prenom').value.toUpperCase(),
                // Format dates to match your existing data format
                birth: formatToJSONDate(document.getElementById('birth').value),
                date_annul: date_annulaton,
            };

            if (id !== "") {
                users[id] = newUser;
            } else {
                users.push(newUser);
            }
            
            displayUsers();
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
        };

        function editUser(index) {
            const user = users[index];
            document.getElementById('userId').value = index;
            document.getElementById('id_mat').value = user.id_mat;
            document.getElementById('num_att').value = user.num_att;
            document.getElementById('nom').value = user.nom;
            document.getElementById('prenom').value = user.prenom;
            document.getElementById('birth').value = formatToHTMLDate(user.birth);
            document.getElementById('date_annul').value = formatToHTMLDate(user.date_annul);
        }

        function deleteUser(index) {
            if(confirm("Delete this user?")) {
                users.splice(index, 1);
                displayUsers();
            }
        }

        // DOWNLOAD LOGIC
        document.getElementById('downloadJson').onclick = function() {
            // Fix: Wrap the array back into the {"users": [...]} structure
            const finalData = { users: users };
            const dataStr = JSON.stringify(finalData, null, 4);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dataJS.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        loadUsers();
    </script>
</body>
</html>
